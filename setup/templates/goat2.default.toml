# GOAT 2.0 — Configuration
# This file is generated by the setup wizard.
# Edit any value below to customize your setup.
# Full docs: https://github.com/your-org/goat2

# ── General ───────────────────────────────────────────────────────────────────

[general]
# Do not edit — managed automatically by the updater.
version = "0.1.0"

# ── LLM Providers ─────────────────────────────────────────────────────────────
# Set default to the provider you use most.
# API keys go in .env, not here.

[providers]
default = "deepseek"

[providers.deepseek]
enabled = true
model   = "deepseek-chat"
# base_url = "https://api.deepseek.com/v1"  # uncomment to override

[providers.openai]
enabled = false
model   = "gpt-4o-mini"

[providers.anthropic]
enabled = false
model   = "claude-sonnet-4-6"

[providers.groq]
enabled = false
model   = "llama-3.3-70b-versatile"

[providers.ollama]
enabled  = false
model    = "llama3.3"
base_url = "http://localhost:11434/v1"

[providers.openrouter]
enabled = false
model   = "meta-llama/llama-3.3-70b-instruct"

[providers.gemini]
enabled = false
model   = "gemini-2.0-flash"

# ── Services ──────────────────────────────────────────────────────────────────
# Disable any service you don't have installed.
# GOAT starts without them but with reduced functionality.

[services.redis]
enabled = true
url     = "redis://localhost:6379/0"

[services.chroma]
enabled     = true
persist_dir = "./chroma_data"

[services.letta]
enabled = false
url     = "http://localhost:8283"

# ── Interface ─────────────────────────────────────────────────────────────────

[interface.telegram]
# Your Telegram chat ID — the bot will send admin notifications here.
# Find it by messaging @userinfobot on Telegram.
admin_chat_id = ""

# ── Updates ───────────────────────────────────────────────────────────────────

[updates]
# Check for new versions on startup.
auto_check = true
# stable = released tags only | beta = includes pre-releases
channel    = "stable"
# GitHub repo to check for updates (owner/repo format).
github_repo = "takashikiari/GOAT2-General-Orchestrated-Agent-Topology"
