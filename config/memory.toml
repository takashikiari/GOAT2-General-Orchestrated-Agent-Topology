[working]
storage_url = "redis://localhost:6379/0"
ttl_seconds = 0
# Max messages kept in working memory per chat; older surplus is auto-promoted
# to episodic (L3) after every save_messages call.
max_messages = 20

[episodic]
storage_path = "./chroma_data"
collection_name = "episodic_memory"

[permanent]
letta_url = "http://localhost:8283"
agent_name = "goat-permanent"
letta_model = "letta/letta-free"
# Token cap on the L1 facts (core-memory) block — promotion is refused past this
# so L1 stays small, curated and always-in-context (off the top of every budget).
l1_facts_max_tokens = 2000

[session_cache]
ttl_seconds = 300

# L0 identity. Set your real persona here — the always-present root instruction.
# Counted against the AITS budget, so keep it concise.
[identity]
base_prompt = "You are GOAT, a helpful assistant with layered memory."

[retrieval_budget]
max_results_per_search = 20
max_context_tokens = 4000
l2_context_cap = 8000
# Fraction of the budget (after L0+L1) reserved for L3 when episodic results are
# available, so L2 cannot starve L3. L2 keeps a floor so it is never fully dropped.
l3_reserve_fraction = 0.3
l2_floor_tokens = 500
# Priority-inverted split: L3 gets first claim on this guaranteed minimum token
# slice; L2 takes the remainder (AITS-scaled). Nonzero by construction on
# realistic budgets, so L3 is never starved to 0. Anchored to observed L3
# injection sizes (1159-1731 tokens); tune empirically (Verification V2).
l3_min_guarantee_tokens = 1200
# Gap-significance threshold for dynamic L3 injection filtering (replaces the
# static l3_similarity_max_distance). The filter keeps results before the largest
# consecutive-score gap when max_gap / mean_gap >= this value — scale-invariant
# by construction, requires no recalibration as the corpus grows with archive docs.
# Calibrated (V3, 2026-06-29, 12 labeled queries, 18-doc corpus): unrelated query
# gap ratios cluster at 2.33–2.76; genuine query ratios at 3.13–5.13. At 3.0:
# 0 genuine FN, 2 unrelated FP (same ambiguous queries static 1.20 also admitted).
# At scale with l2_full_archive, exact-match archive clusters produce ratios >> 10,
# making 3.0 robustly self-calibrating without changes.
l3_gap_significance = 3.0

[aits]
budget_base = 2000
budget_confidence_multiplier = 4000
budget_complexity_max_bonus = 2000
budget_hard_cap = 12000

# Prefetch daemon — runs as the FIRST step in orchestrator.run(), in parallel
# with L0/L1/L2 fetch. No confidence gate: every turn attempts prefetch; the
# timeout is the only blocker. timeout is the asyncio.wait_for bound; max_results
# is the per-turn count cap (token budget is still applied in assemble_context).
# recency_window_days / access_count_ref normalise the merge-score terms;
# score_*_weight are the blend weights (similarity + recency + access_count).
[prefetch]
# 1.5s (was 1.0s): the cold-path pipeline (ChromaDB × 3 parallel + BM25 + GLiNER
# boost + CrossEncoder rerank) takes ~1.08s on a warm JIT-primed CPU even after
# the session-4 JIT warmup fix — 8ms over the old 1.0s bound causes a systematic
# timeout on every cold/thread-break turn. 1.5s gives 38% headroom; warm and drift
# paths still complete in <0.8s so they are unaffected.
timeout = 1.5
max_results = 20
recency_window_days = 30
access_count_ref = 10
# rescore_recency's held-results blend (memory/activation.py): final
# blended_score = recency_base_weight * CrossEncoder base score +
# recency_recency_weight * recency fraction over recency_window_days. Must
# sum to 1.0 (validated). Unchanged 70/30 split moved out of the hardcoded
# function body on 2026-07-12 so it is tunable like every other prefetch
# weight in this section.
recency_base_weight = 0.7
recency_recency_weight = 0.3

# L2.5 brain-activation layer — per-chat thread state that holds the recently
# activated retrieval steady along a topic thread. Time does NOT reset it
# (only attenuates, via the recency merge term); a thread breaks only on a
# CONSENSUS shift (embedding drift AND lexical overlap both drop). A write
# refreshes the activation in place when the written content is on-thread.
# See memory/activation.py.
[activation]
# Redis TTL — cleanup only, NOT a reset. Expiry just means "re-derive cold next
# time"; topic continuity is semantic, not time-based. Lowered from 604800
# (7 days) to 3600 (1 hour) on 2026-07-09: a week-old topic centroid held
# "warm" across a real multi-day gap risks serving stale L3 results instead
# of a fresh search; the trade-off is that topic continuity (including
# archived_topics / "topic return") no longer survives a >1h gap either,
# so a same-day return after e.g. lunch or a meeting now starts cold.
ttl_seconds = 3600
# cosine(query_emb, thread_centroid) >= drift_warm → warm (same thread, serve
# the held activation, skip all three prefetch mechanisms). Tuned to MiniLM L6
# v2's measured geometry: paraphrases + intent follow-ups land 0.80–0.95, so
# 0.80 keeps a real follow-up ("do you remember my wifi password?") WARM instead
# of re-running thematic search every turn.
drift_warm = 0.80
# cosine < drift_cold AND lexical_overlap < lexical_low → CONSENSUS shift
# (cold turn, full three-mechanism search, new activation). Both must drop — a
# single jittery signal (e.g. a short "tell me more" follow-up drifts in
# embedding space but keeps lexical overlap) must NOT reset the thread.
# Recalibrated (2026-07-12, real chat 1912576407 production log, 4 consecutive
# turn pairs a human would call same-thread, embedded with the live MiniLM
# model): cos=0.609/0.344/0.471/0.504, lex=0.0 for all four once lexical_low's
# tokenizer strips Romanian stopwords (see _tokens/_STOPWORDS_RO in
# memory/activation.py) — short follow-ups just don't repeat content words even
# on-thread. At the old drift_cold=0.55 three of these four hard-reset to cold
# every time (warm fired 0/30 turns in the same window — the module's whole
# point was dead). Follow-up live measurement found NO cosine cutoff cleanly
# separates same-thread from genuinely-unrelated switches at this
# short-Romanian-utterance scale: synthetic unrelated pairs measured
# 0.19–0.52, directly overlapping the same-thread 0.34–0.61 range. Given that
# overlap, drift_cold is set conservative (below the measured same-thread
# floor) to stop false hard resets, accepting that some true switches will
# only get "drift" (still a targeted re-search) instead of a full cold reset —
# the safer failure mode per the "mechanisms are support, not decisional"
# principle: a stale-ish drift refresh is recoverable, a lost thread is not.
drift_cold = 0.30
# Same recalibration: stopword-filtered Jaccard tokens are fewer per query, so
# a single shared/missing content word swings the ratio further — lowered
# from 0.15 so the AND-gate needs an even more overwhelming lexical mismatch
# before compounding with drift_cold to force cold.
lexical_low = 0.10
# cosine(write_content_emb, thread_centroid) >= enriching_sim → enriching write
# (on-thread write refreshes the activation in place without drift check).
# Below this threshold the write is off-thread and triggers a consensus-shift
# evaluation. Independent of drift_cold (decoupled 2026-07-12 — drift_cold
# moved to 0.30 but a WRITE landing at 0.30–0.55 cosine to the centroid is
# still weak enough that folding it into the held activation risks polluting
# the thread with a barely-related fact); kept at 0.55 pending its own
# measured calibration.
enriching_sim = 0.55
# How many recent messages to track for lexical overlap (bag-of-words Jaccard
# with the current query). 5 = enough to catch a topic-anchored follow-up
# ("tell me more about that") without being diluted by older context.
lexical_window = 5
# Topic identity for L3 pre-filtering — a topic_id UUID is attached to every
# auto-archived turn and used to narrow the prefetch search space.
topic_return_threshold = 0.75   # cosine sim required to recognise a topic return
topic_archive_max = 10          # past topic centroids kept per chat (newest-last)

# Agentic tool-calling loop — see config/memory.toml [tool_loop]. The cap is a
# hard backstop (bounds cost/latency per turn, kills a runaway loop), never a
# grounding decider. Below the cap the model is called with tools so it can
# chain; at the cap tools are withheld and synthesis is forced.
[tool_loop]
max_iterations = 6
# Cumulative chars of tool output (across every call, every iteration) allowed
# before the round is force-synthesized, same backstop as max_iterations but
# sized to content instead of round count -- a model issuing several large
# read_file/shell_run calls can otherwise blow the resent conversation past
# the model's context window well before max_iterations is reached (2026-07-09
# incident: 6 iterations reached 2.08M tokens in one turn and the API call
# was rejected outright).
max_output_chars = 60000
# Per-tool-call evidence preview formatting (orchestrator._compact_tool_summary).
# Results shorter than result_short_threshold chars are stored verbatim; longer
# ones are head/tail-truncated (head_tail-classified tools) or head-only.
result_short_threshold = 400
result_head_chars = 200
result_tail_chars = 150
# Max chars of a tool call's JSON arguments shown in the evidence preview.
args_preview_chars = 200

# Cross-encoder reranker — re-scores the merged candidate list after BM25 +
# semantic hybrid retrieval. Runs on top_k candidates inside the prefetch
# daemon (1.0s timeout). Disable (enabled = false) if the model is too slow
# for your hardware or if sentence-transformers is not installed.
[reranker]
enabled = true
# Multilingual MS MARCO cross-encoder (~117 MB); downloaded from HuggingFace
# on first warmup and cached in ~/.cache/huggingface.
model = "cross-encoder/mmarco-mMiniLMv2-L12-H384-v1"
# How many candidates to score per turn; balances precision vs. latency.
top_k = 20

[analytics]
log_interval = 100

# Auto-promote: moves working-memory surplus (beyond [working] max_messages)
# into episodic (L3) in chunks, keeping working memory bounded.
[auto_promote]
chunk_size = 50
min_surplus = 4

# Gap-filter fallback cutoff (memory/context_assembler.py) when the
# blended_score distribution is uniform (no clear gap to filter on).
[context_assembler]
blended_min_score = 0.25

# Privacy-truncation cap for the logged user_message field. (greeting/recall
# confidence thresholds stay hardcoded in memory/observability_collector.py —
# analytics-only labels that never gate behaviour; see that module's comment.)
[observability]
max_message_chars = 200

# Score boost applied to L3 results whose content mentions an entity from the
# query (memory/entity_boost.py).
[entity_boost]
weight = 0.2
