# GOAT 2.0 — behavioral learning configuration
#
# Resolution order: env var > config/behavioral.toml > config/limits.py fallback
# Read by `supervisor/behavior/behavior_analyzer.py`. Controls the
# pure-Python style inference — minimum turn count before learning
# fires, thresholds for the field scorers, and the default verbosity
# bucket when the user has not signalled a preference.
#
# =============================================================================

[learning]
min_turns_to_learn       = 2  # below this many user turns → skip inference
max_turns_to_analyze     = 20 # only the most recent N turns are scored
correction_sensitivity   = 0.8 # 0.0 = ignore corrections, 1.0 = strict

[style]
humor_threshold        = 0.3 # minimum signal density for "humor: playful"
formality_threshold    = 0.5 # politeness-vs-slang signal split point
directness_threshold   = 0.7 # curt-word density for "tone: direct"
verbosity_default     = "moderate" # one of: terse | moderate | verbose
